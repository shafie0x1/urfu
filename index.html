<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy System Checklist</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            color: #2c3e50;
            direction: ltr;
            text-align: left;
        }
        h1 {
            font-size: 28px;
            color: #3498db;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        h3 {
            font-size: 20px;
            color: #2980b9;
            margin-top: 25px;
        }
        .checklist {
            max-width: 700px;
            margin: 0 auto;
            display: none;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .item {
            display: flex;
            align-items: center;
            margin: 12px 0;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .item:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .item input[type="checkbox"] {
            margin-right: 12px;
            accent-color: #3498db;
        }
        .item label {
            flex: 1;
            font-size: 16px;
            color: #34495e;
        }
        .completed {
            text-decoration: line-through;
            color: #7f8c8d;
        }
        .input-section {
            text-align: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        .input-section input, .input-section select {
            padding: 10px;
            font-size: 16px;
            width: 85%;
            margin: 10px auto;
            border: 2px solid #dcdcdc;
            border-radius: 8px;
            display: block;
            transition: border-color 0.3s ease;
        }
        .input-section input:focus, .input-section select:focus {
            border-color: #3498db;
            outline: none;
        }
        #newStudentInput {
            display: none;
        }
        .input-section button, .checklist button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.3s ease;
        }
        .input-section button:hover, .checklist button:hover {
            transform: scale(1.05);
        }
        .input-section button:disabled, .checklist button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        .photo-upload {
            margin-top: 20px;
            text-align: center;
        }
        .photo-upload input[type="file"] {
            display: block;
            margin: 10px auto;
        }
    </style>
</head>
<body>
    <h1>Buddy System Checklist</h1>
    <div class="input-section" id="inputSection">
        <input type="text" id="guideName" placeholder="ФИ наставника" required>
        <select id="studentName" required>
            <option value="">Выберите студента</option>
            
        </select>
        <input type="text" id="newStudentInput" placeholder="Введите имя нового студента">
        <input type="text" id="tripNumber" placeholder="Введите номер приезда из таблицы" readonly>
        <button id="startChecklist" disabled>Начать</button>
    </div>
    <div class="checklist" id="checklist">
        <h3>✈️ Встреча и первое заселение</h3>
        <div class="item"><input type="checkbox" id="task1"><label for="task1">Встретить в аэропорту + заселить в хостел</label></div>

        <h3>💰 Финансовые и медицинские вопросы</h3>
        <div class="item"><input type="checkbox" id="task2"><label for="task2">Обменять деньги</label></div>
        <div class="item"><input type="checkbox" id="task3"><label for="task3">Оформить банковскую карту</label></div>
        <div class="item"><input type="checkbox" id="task4"><label for="task4">Купить страховку + пройти медосмотр</label></div>

        <h3>🎓 Оформление в УрФУ</h3>
        <div class="item"><input type="checkbox" id="task5"><label for="task5">Зачислиться в университет</label></div>
        <div class="item"><input type="checkbox" id="task6"><label for="task6">Получить ордер + регистрацию в общежитии</label></div>
        <div class="item"><input type="checkbox" id="task7"><label for="task7">Заселиться в общежитие</label></div>
        <div class="item"><input type="checkbox" id="task8"><label for="task8">Оформить студенческий билет</label></div>

        <h3>📄 Документы и пропуск</h3>
        <div class="item"><input type="checkbox" id="task9"><label for="task9">Получить СНИЛС</label></div>
        <div class="item"><input type="checkbox" id="task10"><label for="task10">Перевести паспорт</label></div>
        <div class="item"><input type="checkbox" id="task11"><label for="task11">Оформить электронный пропуск</label></div>

        <h3>📶 Связь и госуслуги</h3>
        <div class="item"><input type="checkbox" id="task12"><label for="task12">Купить сим-карту</label></div>
        <div class="item"><input type="checkbox" id="task13"><label for="task13">Зарегистрироваться на Госуслугах</label></div>
        <div class="item"><input type="checkbox" id="task14"><label for="task14">Зарегистрировать биометрию</label></div>

        <h3>🛂 Виза и финальные шаги</h3>
        <div class="item"><input type="checkbox" id="task15"><label for="task15">Пройти медосвидетельствование</label></div>
        <div class="item"><input type="checkbox" id="task16"><label for="task16">Пройти дактилоскопию</label></div>
        <div class="item"><input type="checkbox" id="task17"><label for="task17">Продлить визу</label></div>

        <h3>📸 Фото с ИС</h3>
        <div class="item"><input type="checkbox" id="task18"><label for="task18">Сделать фото с ИС</label></div>
        <div class="photo-upload">
            <input type="file" id="studentPhoto" accept="image/*">
            <button id="uploadPhoto">Отправить фото</button>
        </div>
        
        <h3>✅ Готово!</h3>
        <div class="item"><label>Добро пожаловать в УрФУ!</label></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSsQIEgUr_3FJNhd3bTk3J9Ai6gjkV6AlKKkrgadcLjziBCZ0WjJWiCkqAvafECugY/exec";
        const UPDATE_URL = "https://script.google.com/macros/s/AKfycbzKJ0lSuMaKqocf44mta-iHghC-dx3XInWjw7PgouaC_4CuM6Igyi2eMahRbGLjLM4/exec";
        const guideInput = document.getElementById('guideName');
        const studentSelect = document.getElementById('studentName');
        const newStudentInput = document.getElementById('newStudentInput');
        const tripInput = document.getElementById('tripNumber');
        const startButton = document.getElementById('startChecklist');
        const checklist = document.getElementById('checklist');
        const inputSection = document.getElementById('inputSection');
        const photoInput = document.getElementById('studentPhoto');
        const uploadButton = document.getElementById('uploadPhoto');

        function checkInputs() {
            const studentValue = studentSelect.value === 'new' ? newStudentInput.value.trim() : studentSelect.value;
            const isNewStudent = studentSelect.value === 'new';
            startButton.disabled = !(guideInput.value.trim() && studentValue && (!isNewStudent || tripInput.value.trim()));
        }

        guideInput.addEventListener('input', () => {
            checkInputs();
            if (guideInput.value.trim()) fetchStudents(guideInput.value);
        });
        studentSelect.addEventListener('change', () => {
            newStudentInput.style.display = studentSelect.value === 'new' ? 'block' : 'none';
            if (studentSelect.value !== 'new' && studentSelect.value) {
                fetchTripNumberAndProgress(studentSelect.value);
            } else {
                tripInput.value = '';
            }
            checkInputs();
        });
        newStudentInput.addEventListener('input', checkInputs);
        tripInput.addEventListener('input', checkInputs);

        window.onload = () => {
            const savedGuide = localStorage.getItem('lastGuide');
            if (savedGuide) {
                guideInput.value = savedGuide;
                fetchStudents(savedGuide);
            }
        };

        function fetchStudents(guideName) {
            fetch(`${SCRIPT_URL}?guideName=${encodeURIComponent(guideName)}`)
                .then(response => response.json())
                .then(data => {
                    studentSelect.innerHTML = '<option value="">Выберите студента</option>';
                    data.students.forEach(student => {
                        const option = document.createElement('option');
                        option.value = student;
                        option.textContent = student;
                        studentSelect.appendChild(option);
                    });
                    const newOption = document.createElement('option');
                    newOption.value = 'new';
                    newOption.textContent = 'Добавить нового студента';
                    studentSelect.appendChild(newOption);
                    window.tripData = data.trips;
                    window.completedTasksData = data.completedTasks;
                })
                .catch(error => {
                    console.error('Error fetching students:', error);
                    studentSelect.innerHTML = '<option value="">Выберите студента</option><option value="new">Добавить нового студента</option>';
                });
        }

        function fetchTripNumberAndProgress(student) {
            if (window.tripData && window.tripData[student]) {
                tripInput.value = window.tripData[student];
            }
        }

        startButton.addEventListener('click', () => {
            localStorage.setItem('lastGuide', guideInput.value);
            inputSection.style.display = 'none';
            checklist.style.display = 'block';
            loadProgress();
        });

        function loadProgress() {
            const student = studentSelect.value === 'new' ? newStudentInput.value : studentSelect.value;
            const storageKey = `checklist_${student}`;
            let progress = JSON.parse(localStorage.getItem(storageKey) || '{}');
            
            if (studentSelect.value !== 'new' && window.completedTasksData && window.completedTasksData[student]) {
                const tasksFromSheet = window.completedTasksData[student].split(', ').map(task => task.trim());
                document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                    const labelText = checkbox.nextElementSibling.textContent.trim();
                    if (tasksFromSheet.includes(labelText)) {
                        progress[checkbox.id] = true;
                    }
                });
            }

            document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                const isChecked = !!progress[checkbox.id];
                checkbox.checked = isChecked;
                checkbox.nextElementSibling.classList.toggle('completed', isChecked);
            });

            localStorage.setItem(storageKey, JSON.stringify(progress));
        }

        function sendToGoogleSheets(student, trip, guide, task, completedTasks, photoData) {
            const data = {
                studentName: student,
                tripNumber: trip,
                guideName: guide,
                task: task,
                completedTasks: completedTasks,
                timestamp: new Date().toLocaleString('ru-RU'), // تعديل الطابع الزمني لصيغة محلية
                photoData: photoData || null
            };
            fetch(UPDATE_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).catch(error => console.error('Error sending data:', error));
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        const debouncedSendToGoogleSheets = debounce(sendToGoogleSheets, 1000);

        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const label = this.nextElementSibling;
                const student = studentSelect.value === 'new' ? newStudentInput.value : studentSelect.value;
                const trip = tripInput.value;
                const guide = guideInput.value;
                const storageKey = `checklist_${student}`;
                let progress = JSON.parse(localStorage.getItem(storageKey) || '{}');

                if (this.checked) {
                    label.classList.add('completed');
                    progress[this.id] = true;
                } else {
                    label.classList.remove('completed');
                    delete progress[this.id];
                }
                localStorage.setItem(storageKey, JSON.stringify(progress));
                
                const completedTasks = Object.keys(progress)
                    .map(id => document.querySelector(`label[for="${id}"]`).textContent.trim())
                    .join(', ');
                debouncedSendToGoogleSheets(student, trip, guide, label.textContent, completedTasks);
            });
        });

        uploadButton.addEventListener('click', () => {
            const file = photoInput.files[0];
            if (!file) {
                alert('Пожалуйста, выберите фото!');
                return;
            }
            const student = studentSelect.value === 'new' ? newStudentInput.value : studentSelect.value;
            const trip = tripInput.value;
            const guide = guideInput.value;
            const storageKey = `checklist_${student}`;
            const progress = JSON.parse(localStorage.getItem(storageKey) || '{}');
            const completedTasks = Object.keys(progress)
                .map(id => document.querySelector(`label[for="${id}"]`).textContent.trim())
                .join(', ');

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                const photoData = {
                    data: base64Data,
                    type: file.type
                };
                sendToGoogleSheets(student, trip, guide, '', completedTasks, photoData);
                alert('Фото успешно отправлено!');
                photoInput.value = '';
            };
            reader.readAsDataURL(file);
        });
    </script>

</body>
</html>
